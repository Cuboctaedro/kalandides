title: Simple Page

icon: page

status:
  draft: true
  unlisted:
    label: Hidden Page
    text: The page is not listed in the main menu
  listed:
    label: Menu Page
    text: The page is listed in the main menu

tabs:
  content:
    label: Content
    fields:
      body:
        label: Content
        type: blocks
        fieldsets:
          - heading
          - text
          - list
          - image

  files:
    sections:
      gallery:
        label: Images
        type: files
        template: gallery

  meta:
    fields:
      title:
        type: text
        label: Meta Title
      description:
        type: textarea
        label: Meta Description
      image:
        type: files
        label: Meta Image
        multiple: false
      metaindex:
        type: toggle
        label: Add noindex?
        text:
          - no
          - yes
        default: false
      follow:
        type: toggle
        label: Add nofollow?
        text:
          - no
          - yes
        default: false
