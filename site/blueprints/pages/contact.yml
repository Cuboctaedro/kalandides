title: Contact Page

icon: email

status:
  draft: true
  unlisted:
    label: Hidden Page
    text: The page is not listed in the main menu
  listed:
    label: Menu Page
    text: The page is listed in the main menu

tabs:
  content:
    label: Content
    fields:
      text:
        label: Content
        type: writer
        marks:
          - bold
          - italic
          - link
          - clear
        nodes:
          - paragraph
          - heading
          - bulletList
          - orderedList
          - horizontalRule
          - quote

  meta:
    fields:
      title:
        type: text
        label: Meta Title
      description:
        type: textarea
        label: Meta Description
      image:
        type: files
        label: Meta Image
        multiple: false
      metaindex:
        type: toggle
        label: Add noindex?
        text:
          - no
          - yes
        default: false
      follow:
        type: toggle
        label: Add nofollow?
        text:
          - no
          - yes
        default: false
