title: Simple Page

icon: page

status:
  draft: true
  unlisted:
    label: Hidden Page
    text: The page is not listed in the main menu
  listed:
    label: Menu Page
    text: The page is listed in the main menu

tabs:
  content:
    label: Content
    fields:
      parts:
        label: Sections
        type: structure
        columns:
          heading:
            width: 1/3
          text:
            width: 2/3
        fields:
          heading:
            label: Heading
            type: text
          text:
            type: writer
            label: Text
            marks:
              - bold
              - italic
              - link
              - clear
            nodes:
              - paragraph
              - heading
              - bulletList
              - orderedList
              - horizontalRule
              - quote

      poem:
        label: Poem
        type: object
        fields:
          heading:
            type: text
            label: Heading
          text:
            label: Poem
            type: writer
            marks:
              - bold
              - italic
              - clear

  files:
    sections:
      gallery:
        label: Images
        type: files
        template: gallery

  meta:
    fields:
      title:
        type: text
        label: Meta Title
      description:
        type: textarea
        label: Meta Description
      image:
        type: files
        label: Meta Image
        multiple: false
      metaindex:
        type: toggle
        label: Add noindex?
        text:
          - no
          - yes
        default: false
      follow:
        type: toggle
        label: Add nofollow?
        text:
          - no
          - yes
        default: false
