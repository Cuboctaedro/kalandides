title: Blog Post

icon: book

status:
  draft: true
  listed:
    label: Published

tabs:
  content:
    label: Content
    fields:
      title:
        label: Title
        type: text
      date:
        label: Publication date
        type: date
      body:
        label: Content
        type: blocks
        fieldsets:
          - text
          - heading
          - list
          - image

  files:
    sections:
      gallery:
        label: Images
        type: files
        template: gallery

  meta:
    fields:
      metatitle:
        type: text
        label: Meta Title
      metadescription:
        type: textarea
        label: Meta Description
      metaimage:
        type: files
        label: Meta Image
        multiple: false
      metaindex:
        type: toggle
        label: Add noindex?
        text:
          - no
          - yes
        default: false
      metafollow:
        type: toggle
        label: Add nofollow?
        text:
          - no
          - yes
        default: false
