title: Blog Post

icon: book

status:
  draft: true
  listed:
    label: Published

tabs:
  content:
    label: Content
    fields:
      title:
        label: Title
        type: text
      date:
        label: Publication date
        type: date
      text:
        label: Content
        type: writer
        marks:
          - bold
          - italic
          - link
          - clear
        nodes:
          - paragraph
          - heading
          - bulletList
          - orderedList
          - horizontalRule
          - quote

  meta:
    fields:
      metatitle:
        type: text
        label: Meta Title
      metadescription:
        type: textarea
        label: Meta Description
      metaimage:
        type: files
        label: Meta Image
        multiple: false
      metaindex:
        type: toggle
        label: Add noindex?
        text:
          - no
          - yes
        default: false
      metafollow:
        type: toggle
        label: Add nofollow?
        text:
          - no
          - yes
        default: false
